syntax = "proto3";
option go_package = "github.com/madhavan-raja/autorun/autorun";

message CreateRequest {
  string name        = 1;
  string description = 2;
  string command     = 3;
  bool   runOnStart  = 4;
  bool   repeat      = 5;
  uint64 interval    = 6;
}

message CreateResponse{}

service Autorun {
  rpc Create(CreateRequest) returns (CreateResponse);
}